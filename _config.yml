title: "AIxAccessibility 2026"
description: "Workshop on AI and Accessibility — Bridging Intelligence and Inclusion"
baseurl: "/AIxAccessibility"
url: "https://laramartin.net"

# Event details
event:
  name: "AAAI AIxAccessibility 2026"
  tagline: "Bridging Intelligence and Inclusion"
  date: "May 29, 2026"
  location: "Gallaudet University"
  venue: "TBD"

# Build settings
theme: minima
plugins:
  - jekyll-feed
  - jekyll-seo-tag

# Navigation
header_pages:
  - speakers.md
  - program.md
  - organizers.md

# Minima theme settings
minima:
  skin: auto

# Markdown settings
markdown: kramdown
kramdown:
  input: GFM
  hard_wrap: false

# Defaults
defaults:
  - scope:
      path: ""
      type: "pages"
    values:
      layout: "page"
